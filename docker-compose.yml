services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: otaldodolar-app
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - otaldodolar

  nginx:
    image: nginx:stable-alpine
    container_name: otaldodolar-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - otaldodolar
    depends_on:
      - app

networks:
  otaldodolar:
    driver: bridge
